<!-- Top App Bar -->
<div class="top-bar" [class.has-page-title]="pageTitle">
  <div class="top-bar-left">
    <mat-icon class="logo-icon">hail</mat-icon>
    <div class="title-stack">
      <span class="app-title">Ride Share</span>
      @if (pageTitle) {
        <span class="page-title">{{ pageTitle }}</span>
      }
    </div>
  </div>
  <div class="top-bar-right">
    <app-notification-bell></app-notification-bell>
  </div>
</div>

<!-- Main Content Area -->
<main class="content-area">
  <router-outlet></router-outlet>
</main>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <a class="nav-item" routerLink="/passenger" [queryParams]="{tab: 'home'}" [class.active]="isHomeActive">
    <mat-icon>home</mat-icon>
    <span>Home</span>
  </a>
  <a class="nav-item" routerLink="/passenger/browse-rides" routerLinkActive="active">
    <mat-icon>search</mat-icon>
    <span>Find Ride</span>
  </a>
  <a class="nav-item" routerLink="/passenger/my-requests" routerLinkActive="active">
    <mat-icon>pending_actions</mat-icon>
    <span>Requests</span>
  </a>
  <a class="nav-item" routerLink="/passenger" [queryParams]="{tab: 'profile'}" [class.active]="isProfileActive">
    <mat-icon>person</mat-icon>
    <span>Profile</span>
  </a>
</nav>
